<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#05070b"/><stop offset="58%" stop-color="#0b1018"/><stop offset="100%" stop-color="#111827"/></linearGradient>
    <linearGradient id="a" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#6ee7ff"/><stop offset="100%" stop-color="#a7f3d0"/></linearGradient>
    <radialGradient id="g" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#6ee7ff" stop-opacity="0.28"/><stop offset="100%" stop-color="#6ee7ff" stop-opacity="0"/></radialGradient>
    <style>
      .k{font:700 16px Arial,sans-serif;fill:#6ee7ff;letter-spacing:3px}.t{font:800 60px Arial,sans-serif;fill:#f8fbff}.s{font:400 25px Arial,sans-serif;fill:#b8c4d2}.h{font:800 24px Arial,sans-serif;fill:#f8fbff}.b{font:400 18px Arial,sans-serif;fill:#bdc8d5}.small{font:400 15px Arial,sans-serif;fill:#8899aa}.card{fill:#101923;stroke:#2a3d52;stroke-width:1.2}.core{fill:#07111c;stroke:#6ee7ff;stroke-width:2}.line{fill:none;stroke:url(#a);stroke-width:5;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}.num{font:800 18px Arial,sans-serif;fill:#061018}.chip{fill:#0b131d;stroke:#24384d;stroke-width:1.1}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#a7f3d0"/></marker>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="800" cy="455" r="350" fill="url(#g)"/>
  <text x="72" y="80" class="k">AI SYSTEM / PRODUCT THINKING</text>
  <text x="72" y="148" class="t">MarketForge / PRACA2</text>
  <text x="75" y="194" class="s">Not a job-search bot. A closed-loop decision system for opportunity discovery.</text>
  <g transform="translate(625 330)">
    <rect class="core" x="0" y="0" width="350" height="210" rx="26"/>
    <text x="42" y="74" style="font:800 36px Arial,sans-serif;fill:#f8fbff">Candidate Memory</text>
    <text x="42" y="114" class="b">experience, constraints, tools, evidence, target work mechanics</text>
    <rect class="chip" x="42" y="145" width="260" height="38" rx="12"/><text x="64" y="170" class="small">local semantic context for review</text>
  </g>
  <g>
    <rect class="card" x="170" y="275" width="255" height="118" rx="18"/><circle cx="204" cy="315" r="17" fill="#6ee7ff"/><text x="199" y="321" class="num">1</text><text x="235" y="318" class="h">Search intent</text><text x="198" y="354" class="b">User describes direction in natural language.</text>
    <rect class="card" x="475" y="135" width="270" height="118" rx="18"/><circle cx="509" cy="175" r="17" fill="#6ee7ff"/><text x="504" y="181" class="num">2</text><text x="540" y="178" class="h">Search generator</text><text x="503" y="214" class="b">Turns intent into query seeds, routes and source plans.</text>
    <rect class="card" x="855" y="135" width="270" height="118" rx="18"/><circle cx="889" cy="175" r="17" fill="#6ee7ff"/><text x="884" y="181" class="num">3</text><text x="920" y="178" class="h">DeepDiscovery</text><text x="883" y="214" class="b">Collects evidence from boards, companies, ATS pages.</text>
    <rect class="card" x="1180" y="275" width="255" height="118" rx="18"/><circle cx="1214" cy="315" r="17" fill="#a7f3d0"/><text x="1209" y="321" class="num">4</text><text x="1245" y="318" class="h">Job intake</text><text x="1208" y="354" class="b">Preserves raw text and extracts structured facts.</text>
    <rect class="card" x="1180" y="535" width="255" height="118" rx="18"/><circle cx="1214" cy="575" r="17" fill="#a7f3d0"/><text x="1209" y="581" class="num">5</text><text x="1245" y="578" class="h">Semantic review</text><text x="1208" y="614" class="b">Compares work mechanics, not only job titles.</text>
    <rect class="card" x="855" y="680" width="270" height="118" rx="18"/><circle cx="889" cy="720" r="17" fill="#a7f3d0"/><text x="884" y="726" class="num">6</text><text x="920" y="723" class="h">Application pack</text><text x="883" y="759" class="b">Drafts role-specific message, CV notes and rationale.</text>
    <rect class="card" x="475" y="680" width="270" height="118" rx="18"/><circle cx="509" cy="720" r="17" fill="#a7f3d0"/><text x="504" y="726" class="num">7</text><text x="540" y="723" class="h">Gmail tracker</text><text x="503" y="759" class="b">Records replies, status changes and follow-up signals.</text>
    <rect class="card" x="170" y="535" width="255" height="118" rx="18"/><circle cx="204" cy="575" r="17" fill="#6ee7ff"/><text x="199" y="581" class="num">8</text><text x="235" y="578" class="h">Query memory</text><text x="198" y="614" class="b">Feedback improves the next search direction.</text>
  </g>
  <path class="line" d="M425 305 C475 245 500 220 475 194"/><path class="line" d="M745 190 H846"/><path class="line" d="M1125 194 C1180 215 1205 245 1210 285"/><path class="line" d="M1308 393 V526"/><path class="line" d="M1180 610 C1110 680 1085 705 1125 725"/><path class="line" d="M855 735 H746"/><path class="line" d="M475 725 C410 695 380 650 425 600"/><path class="line" d="M170 575 C105 505 110 382 170 334"/>
  <text x="74" y="852" class="b">The loop closes after the application, not at the Apply button.</text>
</svg>
