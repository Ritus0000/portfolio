<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f7f9fc"/><stop offset="100%" stop-color="#e9eef5"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#0b4f8c"/><stop offset="100%" stop-color="#2e8b57"/></linearGradient>
    <style>
      .k{font:700 16px Arial,sans-serif;fill:#0b4f8c;letter-spacing:3px}.t{font:800 48px Arial,sans-serif;fill:#0c1724}.s{font:400 24px Arial,sans-serif;fill:#5f6b7a}.h{font:800 24px Arial,sans-serif;fill:#0c1724}.b{font:400 18px Arial,sans-serif;fill:#44515f}.small{font:400 15px Arial,sans-serif;fill:#647386}.card{fill:#fff;stroke:#d3dbe6;stroke-width:1.4}.dark{fill:#0d1622}.line{fill:none;stroke:url(#accent);stroke-width:4;stroke-linecap:round;marker-end:url(#arrow)}.badge{fill:#edf5ff;stroke:#c9dbee}.out{fill:#eef7f2;stroke:#c5dfd0}.num{font:800 18px Arial,sans-serif;fill:#fff}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 Z" fill="#2e8b57"/></marker>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="72" y="82" class="k">SYSTEM MAP</text>
  <text x="72" y="140" class="t">From Virtual Blade to AI Dataset</text>
  <text x="75" y="182" class="s">A connected pipeline where scene, mission, outputs and review stay aligned.</text>
  <g transform="translate(70 265)">
    <rect class="card" x="0" y="0" width="255" height="315" rx="14"/><circle cx="34" cy="38" r="18" fill="#0b4f8c"/><text x="29" y="44" class="num">1</text><text x="62" y="46" class="h">Digital object</text><text x="28" y="92" class="b">Controllable industrial 3D asset</text><text x="28" y="128" class="small">- geometry and scale</text><text x="28" y="154" class="small">- surface materials</text><text x="28" y="180" class="small">- controlled visual states</text><text x="28" y="206" class="small">- damage / wear variants</text><rect x="28" y="246" width="198" height="36" rx="10" class="badge"/><text x="48" y="270" class="small">spatial representation</text>
    <rect class="card" x="300" y="0" width="255" height="315" rx="14"/><circle cx="334" cy="38" r="18" fill="#0b4f8c"/><text x="329" y="44" class="num">2</text><text x="362" y="46" class="h">Mission logic</text><text x="328" y="92" class="b">Camera movement as inspection</text><text x="328" y="128" class="small">- side-based paths</text><text x="328" y="154" class="small">- static and dynamic runs</text><text x="328" y="180" class="small">- coverage logic</text><text x="328" y="206" class="small">- repeatable camera poses</text><rect x="328" y="246" width="180" height="36" rx="10" class="badge"/><text x="348" y="270" class="small">inspection sequence</text>
    <rect class="card" x="600" y="0" width="255" height="315" rx="14"/><circle cx="634" cy="38" r="18" fill="#0b4f8c"/><text x="629" y="44" class="num">3</text><text x="662" y="46" class="h">Render engine</text><text x="628" y="92" class="b">Automated frame generation</text><text x="628" y="128" class="small">- configured runs</text><text x="628" y="154" class="small">- 4K full-GT output</text><text x="628" y="180" class="small">- deterministic structure</text><text x="628" y="206" class="small">- metadata per frame</text><rect x="628" y="246" width="177" height="36" rx="10" class="badge"/><text x="648" y="270" class="small">production pipeline</text>
    <rect class="card" x="900" y="0" width="255" height="315" rx="14"/><circle cx="934" cy="38" r="18" fill="#2e8b57"/><text x="929" y="44" class="num">4</text><text x="962" y="46" class="h">Ground truth</text><text x="928" y="92" class="b">Synchronized ML channels</text><text x="928" y="128" class="small">- RGB / albedo</text><text x="928" y="154" class="small">- masks / depth</text><text x="928" y="180" class="small">- normals / optical flow</text><text x="928" y="206" class="small">- visibility / metadata</text><rect x="928" y="246" width="162" height="36" rx="10" class="out"/><text x="948" y="270" class="small">AI-ready data</text>
    <rect class="card" x="1200" y="0" width="255" height="315" rx="14"/><circle cx="1234" cy="38" r="18" fill="#2e8b57"/><text x="1229" y="44" class="num">5</text><text x="1262" y="46" class="h">Review / QA</text><text x="1228" y="92" class="b">Make the dataset inspectable</text><text x="1228" y="128" class="small">- path review videos</text><text x="1228" y="154" class="small">- frame validation</text><text x="1228" y="180" class="small">- alignment checks</text><text x="1228" y="206" class="small">- reproducibility control</text><rect x="1228" y="246" width="170" height="36" rx="10" class="out"/><text x="1248" y="270" class="small">quality evidence</text>
    <path class="line" d="M255 157 H292"/><path class="line" d="M555 157 H592"/><path class="line" d="M855 157 H892"/><path class="line" d="M1155 157 H1192"/>
  </g>
  <g transform="translate(115 675)">
    <rect class="dark" x="0" y="0" width="1370" height="100" rx="18"/><text x="36" y="40" style="font:800 25px Arial,sans-serif;fill:#f8fbff">Why this matters</text><text x="36" y="72" style="font:400 19px Arial,sans-serif;fill:#c7d4e3">The value is not only rendering. The value is keeping a spatial object, camera mission, data channels and QA evidence in one coherent production system.</text>
  </g>
</svg>
