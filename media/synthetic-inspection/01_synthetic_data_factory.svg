<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#05070b"/><stop offset="55%" stop-color="#0b111a"/><stop offset="100%" stop-color="#101827"/></linearGradient>
    <linearGradient id="blade" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="50%" stop-color="#9fb7d2"/><stop offset="100%" stop-color="#36475c"/></linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#2ec8ff"/><stop offset="100%" stop-color="#ffb347"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#2ec8ff" stop-opacity="0.45"/><stop offset="100%" stop-color="#2ec8ff" stop-opacity="0"/></radialGradient>
    <style>
      .k{font:700 18px Arial,sans-serif;fill:#74d7ff;letter-spacing:4px}.t{font:800 58px Arial,sans-serif;fill:#f7fbff}.s{font:400 26px Arial,sans-serif;fill:#b8c4d2}.h{font:700 28px Arial,sans-serif;fill:#f4f8ff}.b{font:400 19px Arial,sans-serif;fill:#b7c6d7}.m{font:800 42px Arial,sans-serif;fill:#fff}.ml{font:600 15px Arial,sans-serif;fill:#8fa4b8;letter-spacing:1px}.card{fill:#101923;stroke:#2a3d52;stroke-width:1.3}.chip{fill:#0b131d;stroke:#27455c;stroke-width:1.1}.f{fill:none;stroke:url(#line);stroke-width:5;stroke-linecap:round;stroke-linejoin:round}.thin{fill:none;stroke:#2ec8ff;stroke-width:1.5;opacity:.34}.num{font:800 22px Arial,sans-serif;fill:#071019}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1240" cy="190" r="330" fill="url(#glow)"/>
  <text x="70" y="80" class="k">PORTFOLIO CASE / CURRENT WORK</text>
  <text x="70" y="145" class="t">Synthetic Inspection Data Factory</text>
  <text x="73" y="190" class="s">From virtual wind-turbine inspection to synchronized AI-ready ground truth</text>
  <g transform="translate(95 285)">
    <path d="M0 210 C145 78 455 48 825 22 C980 10 1090 58 1170 132 C870 154 610 212 245 292 C105 324 28 288 0 210 Z" fill="url(#blade)" stroke="#d8e7f7" stroke-width="2.5" opacity=".93"/>
    <path d="M92 208 C285 155 548 118 930 80" class="thin"/>
    <path d="M160 245 C395 198 670 165 1065 128" class="thin"/>
    <path d="M260 278 C530 236 760 205 1125 165" class="thin"/>
    <path d="M330 -30 C560 80 720 145 910 206" class="f" opacity=".82"/>
    <circle cx="330" cy="-30" r="10" fill="#2ec8ff"/><circle cx="910" cy="206" r="10" fill="#ffb347"/>
    <text x="925" y="230" class="b">camera / drone-like mission path</text>
  </g>
  <g transform="translate(78 700)">
    <rect class="card" x="0" y="0" width="450" height="110" rx="16"/><text x="28" y="42" class="h">1. Build the digital object</text><text x="28" y="75" class="b">geometry, surfaces, visual states, damage variants</text>
    <rect class="card" x="575" y="0" width="450" height="110" rx="16"/><text x="603" y="42" class="h">2. Run the inspection mission</text><text x="603" y="75" class="b">repeatable camera paths and side-based coverage</text>
    <rect class="card" x="1150" y="0" width="370" height="110" rx="16"/><text x="1178" y="42" class="h">3. Generate ground truth</text><text x="1178" y="75" class="b">RGB, masks, depth, normals, flow, metadata</text>
    <path d="M468 55 H550" class="f"/><path d="M1044 55 H1126" class="f"/>
  </g>
  <g transform="translate(1025 278)">
    <rect class="chip" x="0" y="0" width="170" height="88" rx="14"/><text x="26" y="43" class="m">60</text><text x="26" y="67" class="ml">SIDE RUNS</text>
    <rect class="chip" x="190" y="0" width="210" height="88" rx="14"/><text x="216" y="43" class="m">3,836</text><text x="216" y="67" class="ml">FULL-GT FRAMES</text>
    <rect class="chip" x="420" y="0" width="190" height="88" rx="14"/><text x="446" y="43" class="m">52.37</text><text x="446" y="67" class="ml">GIB OUTPUT</text>
  </g>
  <text x="74" y="858" class="b">Core message: not a render demo, but an end-to-end synthetic visual-data production system.</text>
</svg>
