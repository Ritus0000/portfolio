<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#07101a"/><stop offset="100%" stop-color="#0f1724"/></linearGradient>
    <linearGradient id="a" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#2ec8ff"/><stop offset="100%" stop-color="#ffb347"/></linearGradient>
    <style>
      .k{font:700 16px Arial,sans-serif;fill:#74d7ff;letter-spacing:3px}.t{font:800 52px Arial,sans-serif;fill:#f7fbff}.s{font:400 24px Arial,sans-serif;fill:#b8c4d2}.m{font:900 74px Arial,sans-serif;fill:#fff}.l{font:700 18px Arial,sans-serif;fill:#91a7bd;letter-spacing:1px}.h{font:800 26px Arial,sans-serif;fill:#f8fbff}.b{font:400 19px Arial,sans-serif;fill:#bdc8d5}.small{font:400 16px Arial,sans-serif;fill:#8899aa}.card{fill:#111c29;stroke:#2a4056;stroke-width:1.3}.line{fill:none;stroke:url(#a);stroke-width:5;stroke-linecap:round}.tick{fill:#ffb347}.mono{font:500 17px Consolas,monospace;fill:#a9bdd1}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="74" y="82" class="k">PRODUCTION EVIDENCE</text>
  <text x="74" y="148" class="t">Scale changes the problem</text>
  <text x="77" y="192" class="s">At thousands of full-ground-truth frames, the task becomes data consistency, reviewability and reproducibility.</text>
  <g transform="translate(80 280)">
    <rect class="card" x="0" y="0" width="330" height="200" rx="18"/><text x="34" y="88" class="m">60</text><text x="38" y="126" class="l">SIDE RUNS</text><text x="38" y="162" class="b">Static and dynamic inspection sequences across blade sides.</text>
    <rect class="card" x="370" y="0" width="390" height="200" rx="18"/><text x="404" y="88" class="m">3,836</text><text x="408" y="126" class="l">FULL-GT FRAMES</text><text x="408" y="162" class="b">Every frame must keep all channels aligned to the same camera state.</text>
    <rect class="card" x="800" y="0" width="330" height="200" rx="18"/><text x="834" y="88" class="m">52.37</text><text x="838" y="126" class="l">GIB OUTPUT</text><text x="838" y="162" class="b">A batch large enough to require structure, manifests and QA.</text>
    <rect class="card" x="1170" y="0" width="310" height="200" rx="18"/><text x="1204" y="88" class="m">~25</text><text x="1208" y="126" class="l">MIN / 4K SIDE RUN</text><text x="1208" y="162" class="b">Production runtime makes mistakes expensive.</text>
  </g>
  <g transform="translate(110 565)">
    <path class="line" d="M0 80 H1320"/>
    <circle cx="70" cy="80" r="13" class="tick"/><circle cx="300" cy="80" r="13" class="tick"/><circle cx="540" cy="80" r="13" class="tick"/><circle cx="790" cy="80" r="13" class="tick"/><circle cx="1040" cy="80" r="13" class="tick"/><circle cx="1260" cy="80" r="13" class="tick"/>
    <text x="20" y="35" class="h">RGB</text><text x="235" y="35" class="h">Mask</text><text x="470" y="35" class="h">Depth</text><text x="715" y="35" class="h">Normals</text><text x="950" y="35" class="h">Flow</text><text x="1170" y="35" class="h">Metadata</text>
    <text x="0" y="135" class="small">The hard requirement: each output layer must describe the same frame, camera pose and inspection context.</text>
  </g>
  <g transform="translate(115 735)">
    <rect x="0" y="0" width="1370" height="78" rx="16" fill="#0b131d" stroke="#26384b"/>
    <text x="34" y="32" class="mono">real engineering question:</text>
    <text x="284" y="32" class="b">Can this data be trusted by a computer-vision pipeline, not just viewed as a pretty render?</text>
    <text x="34" y="58" class="small">That is why QA, manifests, visual review and reproducible run structure matter.</text>
  </g>
</svg>
